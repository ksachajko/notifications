# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    notifications.channels.email.enabled: true
    notifications.channels.sms.enabled: true

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Provider\Email\SesEmailProvider:
        arguments:
            $fromEmail: '%env(AWS_SES_FROM_EMAIL)%'
            $region: '%env(AWS_DEFAULT_REGION)%'
            $accessKeyId: '%env(AWS_ACCESS_KEY_ID)%'
            $secretAccessKey: '%env(AWS_SECRET_ACCESS_KEY)%'

    App\Handler\EmailNotificationHandler:
        arguments:
            $providers:
                - '@App\Provider\Email\SesEmailProvider'
                - '@App\Provider\Email\PlaceholderEmailProvider'

    App\Handler\SmsNotificationHandler:
        arguments:
            $providers:
                - '@App\Provider\Sms\PlaceholderSmsProvider1'
                - '@App\Provider\Sms\PlaceholderSmsProvider2'

    App\Controller\NotificationController:
        arguments:
            $enabledChannels:
                email: '%notifications.channels.email.enabled%'
                sms: '%notifications.channels.sms.enabled%'

    App\Service\NotificationDispatcher:
        arguments:
            $enabledChannels:
                email: '%notifications.channels.email.enabled%'
                sms: '%notifications.channels.sms.enabled%'
